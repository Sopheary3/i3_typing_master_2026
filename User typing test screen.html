<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Test - I3 Typing Master</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 80%; max-width: 800px; }
        #text-display { font-size: 1.4rem; line-height: 1.6; margin-bottom: 20px; color: #444; background: #fafafa; padding: 15px; border-radius: 5px; border: 1px solid #ddd; }
        #typing-area { width: 100%; height: 100px; font-size: 1.2rem; padding: 10px; border: 2px solid #007bff; border-radius: 8px; outline: none; box-sizing: border-box; }
        .stats { display: flex; gap: 30px; margin-top: 20px; font-weight: bold; font-size: 1.1rem; color: #333; }
        .stat-box { background: #e7f3ff; padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>I3 Typing Master - Test Your Speed</h2>
    
    <div id="text-display">The quick brown fox jumps over the lazy dog. Programming in Java and HTML is a great way to build your technical skills.</div>

    <textarea id="typing-area" placeholder="Start typing here..."></textarea>

    <div class="stats">
        <div class="stat-box">WPM: <span id="wpm">0</span></div>
        <div class="stat-box">Accuracy: <span id="accuracy">100%</span></div>
        <div class="stat-box">Time: <span id="timer">60s</span></div>
    </div>
    
    <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; cursor: pointer;">Restart Test</button>
</div>

<script>
    const typingArea = document.getElementById('typing-area');
    const wpmDisplay = document.getElementById('wpm');
    let startTime;

    typingArea.addEventListener('input', () => {
        if (!startTime) startTime = new Date();
        
        const textTyped = typingArea.value.trim();
        const wordCount = textTyped.split(/\s+/).length;
        
        // Simple WPM calculation
        const timeElapsed = (new Date() - startTime) / 60000; // in minutes
        if (timeElapsed > 0) {
            const wpm = Math.round(wordCount / timeElapsed);
            wpmDisplay.innerText = wpm;
        }
    });
</script>

</body>
</html>
